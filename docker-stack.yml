version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zyger_erp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  backend:
    image: ${BACKEND_IMAGE:-zyger-erp-backend:latest}
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-zyger_erp}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-12345}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
    networks:
      - erp_internal
      - erp_public
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first

  frontend:
    image: ${FRONTEND_IMAGE:-zyger-erp-frontend:latest}
    ports:
      - target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
        mode: ingress
      - target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
        mode: ingress
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - erp_public
    depends_on:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - erp_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  erp_internal:
    driver: overlay
    attachable: true
  erp_public:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  certbot_conf:
  certbot_www:
