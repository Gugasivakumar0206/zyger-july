server {
    listen 80;
    server_name zygertechnology.in stable.zygertechnology.in staging.zygertechnology.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name zygertechnology.in;

    ssl_certificate /etc/letsencrypt/live/zygertechnology.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zygertechnology.in/privkey.pem;

    return 301 https://stable.zygertechnology.in$request_uri;
}

server {
    listen 443 ssl;
    server_name stable.zygertechnology.in;

    ssl_certificate /etc/letsencrypt/live/zygertechnology.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zygertechnology.in/privkey.pem;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name staging.zygertechnology.in;

    ssl_certificate /etc/letsencrypt/live/zygertechnology.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zygertechnology.in/privkey.pem;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://zyger-demo-backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://zyger-demo-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
