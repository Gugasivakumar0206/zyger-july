services:
  postgres:
    image: postgres:16-alpine
    container_name: zyger-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zyger_erp_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init_app.sql:/docker-entrypoint-initdb.d/init_app.sql:ro

  backend:
    build:
      context: ./backend
    container_name: zyger-demo-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: zyger_erp_demo
      DB_USER: postgres
      DB_PASSWORD: 12345
      AUTH_SECRET_KEY: zyger_erp_demo_secure_secret_2026
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: zyger-demo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: zyger-demo-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "8082:80"
      - "8443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    container_name: zyger-demo-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
      while :;
      do
        certbot renew --webroot -w /var/www/certbot;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
